<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Analytical modeling for noisy systems</title>
  <desc id="desc">Stochastic differential equations, Bayesian observer models, natural image segmentation, probabilistic inference, expected value, and game-theoretic decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBF7EF"/>
      <stop offset="0.65" stop-color="#F8F1E4"/>
      <stop offset="1" stop-color="#F5EBDC"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6B5D4D" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <path d="M0 68H1200M0 136H1200M0 204H1200M0 272H1200" stroke="#E7DDCE" stroke-opacity="0.58"/>
  <path d="M180 0V340M360 0V340M540 0V340M720 0V340M900 0V340M1080 0V340" stroke="#E7DDCE" stroke-opacity="0.42"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="58" y="70" fill="#171717" font-size="42" font-weight="780">Analytical modeling for noisy systems</text>
    <text x="58" y="112" fill="#5E574E" font-size="21">SDEs | Bayesian vision | segmentation | expected-value decisions</text>
    <text x="58" y="158" fill="#4A423A" font-size="18">Closed-form moments, efficient coding, MLE, and validation loops for noisy data.</text>
    <text x="58" y="204" fill="#6F7F4D" font-size="17" font-weight="720">random dynamics -> Bayesian inference -> vision / segmentation -> EV decisions</text>
