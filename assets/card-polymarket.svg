<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Probabilistic pricing and market research card</title>
  <desc id="desc">Research-driven Polymarket weather-markets framework for probabilistic pricing and execution analysis.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6B5D4D" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="250" rx="24" fill="#FBF7EF"/>
  <path d="M0 62H1200M0 125H1200M0 188H1200" stroke="#E7DDCE" stroke-opacity="0.5"/>
  <path d="M200 0V250M400 0V250M600 0V250M800 0V250M1000 0V250" stroke="#E7DDCE" stroke-opacity="0.34"/>
  <rect x="22" y="22" width="1156" height="206" rx="22" fill="#FFFDF8" stroke="#D8D0C1" stroke-width="1.5" filter="url(#shadow)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">

    <g transform="translate(52 44)">
      <circle cx="80" cy="80" r="72" fill="#F7EFE2" stroke="#D8D0C1" stroke-width="1.4"/>
      <path d="M30 130 C46 98 62 72 82 104 C96 124 106 104 114 82" stroke="#0B2447" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="82" cy="104" r="9" fill="#D97757"/>
      <path d="M82 44 V146" stroke="#D97757" stroke-width="2" stroke-dasharray="7 7"/>
      <path d="M126 56 H166M126 78 H154M126 100 H172" stroke="#D97757" stroke-width="9"/>
      <path d="M126 124 H160M126 146 H148" stroke="#6F7F4D" stroke-width="9"/>
    </g>
    <text x="240" y="68" fill="#171717" font-size="31" font-weight="780">Probabilistic Pricing Research</text>
    <text x="240" y="106" fill="#5E574E" font-size="18">Prediction-market contracts modeled as expected-value and execution problems.</text>
    <text x="240" y="142" fill="#4A423A" font-size="17">Observation lag, order-book repricing, settlement labels, and post-trade attribution.</text>
    <text x="240" y="184" fill="#6F7F4D" font-size="16" font-weight="720">expected value | settlement-labeled backtests | microstructure | execution quality</text>
</g>
