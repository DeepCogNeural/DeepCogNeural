<svg width="1200" height="230" viewBox="0 0 1200 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Probabilistic pricing and market research card</title>
  <desc id="desc">Research-driven Polymarket weather-markets framework for probabilistic pricing and execution analysis.</desc>
  <rect width="1200" height="230" rx="18" fill="#f8fafc"/>
  <rect x="1" y="1" width="1198" height="228" rx="17" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="30" y="35" width="160" height="160" rx="24" fill="#7c2d12"/>
  <path d="M62 146 L88 114 L116 126 L154 70" stroke="#fed7aa" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="154" cy="70" r="10" fill="#facc15"/>
  <path d="M58 170 H162" stroke="#fdba74" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <text x="230" y="60" fill="#0f172a" font-size="29" font-weight="760" font-family="Inter, ui-sans-serif, system-ui">Probabilistic Pricing Research</text>
  <text x="230" y="96" fill="#334155" font-size="18" font-family="Inter, ui-sans-serif, system-ui">Polymarket weather contracts as pricing problems.</text>
  <text x="230" y="132" fill="#475569" font-size="16" font-family="Inter, ui-sans-serif, system-ui">Observation lag, order-book repricing, and microstructure.</text>
  <text x="230" y="168" fill="#9a3412" font-size="15" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">expected value | settlement-labeled backtests</text>
  <text x="230" y="194" fill="#9a3412" font-size="15" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">execution quality | post-trade attribution</text>
