      <text x="650" y="466" fill="#6E7F4E" font-size="16" font-weight="700">Settlement-labeled backtests</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="968" y="326" width="476" height="170" rx="20" fill="#F9F6EE" stroke="#D8D0C1" stroke-width="1.5"/>
      <g transform="translate(1002 370)">
