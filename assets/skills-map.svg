<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Core skills map</title>
  <desc id="desc">A labeled skills map connecting stochastic differential equations, Bayesian observer models, natural image segmentation, expected value, game theory, market microstructure, and research systems.</desc>
  <defs>
