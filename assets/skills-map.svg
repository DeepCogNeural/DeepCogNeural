      </g>
      <text x="1188" y="372" fill="#111827" font-size="24" font-weight="760">Research systems</text>
      <text x="1188" y="408" fill="#4B423A" font-size="17">Python / SQL pipelines</text>
      <text x="1188" y="437" fill="#4B423A" font-size="17">NumPy, SciPy, Pandas</text>
      <text x="1188" y="466" fill="#6E7F4E" font-size="16" font-weight="700">Offline eval -> live attribution</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="474" y="524" width="970" height="64" rx="18" fill="#F9F6EE" stroke="#D8D0C1" stroke-width="1.5"/>
      <text x="504" y="563" fill="#111827" font-size="21" font-weight="760">Research loop</text>
      <text x="680" y="563" fill="#4B423A" font-size="17">model noise</text>
      <path d="M782 557 H826" stroke="#D97757" stroke-width="2.8" stroke-linecap="round"/>
      <text x="850" y="563" fill="#4B423A" font-size="17">infer latent state</text>
      <path d="M1000 557 H1044" stroke="#D97757" stroke-width="2.8" stroke-linecap="round"/>
      <text x="1068" y="563" fill="#4B423A" font-size="17">predict</text>
      <path d="M1130 557 H1174" stroke="#D97757" stroke-width="2.8" stroke-linecap="round"/>
