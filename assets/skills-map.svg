      <text x="640" y="243" fill="#4B423A" font-size="17">Natural images -> V1 variability</text>
      <text x="640" y="272" fill="#6E7F4E" font-size="16" font-weight="700">Fano dynamics, latent state, MLE</text>
    </g>

