        <text x="88" y="404">SDEs + stochastic processes</text>
        <text x="88" y="436">Bayesian inference + MLE</text>
        <text x="88" y="468">Closed-form moments</text>
        <text x="88" y="500">Time-series variability</text>
      </g>
    </g>

