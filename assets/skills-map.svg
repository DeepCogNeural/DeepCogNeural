<svg width="1500" height="620" viewBox="0 0 1500 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linghao Xu core research stack</title>
  <desc id="desc">A research stack connecting first-principles mathematics, stochastic neural dynamics, Bayesian vision and VR/XR perception, probabilistic pricing, and research systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.55" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#175368"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#F6C453"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="135%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#06111F" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1500" height="620" rx="28" fill="url(#bg)"/>
  <path d="M0 92 H1500M0 184 H1500M0 276 H1500M0 368 H1500M0 460 H1500M0 552 H1500" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <path d="M180 0 V620M360 0 V620M540 0 V620M720 0 V620M900 0 V620M1080 0 V620M1260 0 V620" stroke="#FFFFFF" stroke-opacity="0.055"/>

