<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linghao Xu core skill set</title>
  <desc id="desc">A compact skill tree connecting mathematical modeling, neural and vision research, quantitative markets, and research systems.</desc>
