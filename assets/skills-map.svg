      <text x="1200" y="178" fill="#111827" font-size="23" font-weight="760">Bayesian vision</text>
      <text x="1200" y="214" fill="#4B423A" font-size="17">Efficient observer models</text>
      <text x="1200" y="243" fill="#4B423A" font-size="17">VR/XR optic-flow heading</text>
      <text x="1200" y="272" fill="#6E7F4E" font-size="16" font-weight="700">Perception-action bias</text>
    </g>

