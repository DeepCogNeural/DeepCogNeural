    <text x="56" y="102" fill="#CFE8F3" font-size="19">Math-first modeling for neural variability, human perception, and probabilistic markets.</text>

    <g filter="url(#shadow)">
      <rect x="56" y="132" width="384" height="420" rx="24" fill="#F9F6EE" stroke="#D8D0C1" stroke-width="1.5"/>
      <text x="88" y="178" fill="#111827" font-size="26" font-weight="780">Mathematical engine</text>
      <text x="88" y="210" fill="#5F574D" font-size="16">Turn noisy systems into tractable models.</text>

      <g transform="translate(88 242)">
        <rect x="0" y="0" width="150" height="128" rx="18" fill="#111827"/>
        <text x="28" y="39" fill="#E0F2FE" font-size="31" font-weight="800">N<tspan baseline-shift="sub" font-size="17">t</tspan></text>
        <path d="M26 58 H124" stroke="#B7C4D6" stroke-width="7" stroke-linecap="round"/>
        <text x="28" y="102" fill="#FEF3C7" font-size="31" font-weight="800">D<tspan baseline-shift="sub" font-size="17">t</tspan></text>
        <path d="M16 116 C42 82 66 126 94 92 C118 62 136 100 148 78" stroke="#38BDF8" stroke-width="7" stroke-linecap="round"/>
      </g>

