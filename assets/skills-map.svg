      .title { fill: #171717; font-size: 42px; font-weight: 780; }
      .subtitle { fill: #5E574E; font-size: 22px; }
      .moduleTitle { fill: #111827; font-size: 25px; font-weight: 780; }
      .moduleText { fill: #463F37; font-size: 18px; }
      .moduleKey { fill: #6F7F4D; font-size: 17px; font-weight: 720; }
