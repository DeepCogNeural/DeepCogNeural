<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian perception-action card</title>
  <desc id="desc">Bayesian models of heading perception and response mapping.</desc>
  <rect width="1200" height="220" rx="18" fill="#f8fafc"/>
  <rect x="1" y="1" width="1198" height="218" rx="17" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="30" y="30" width="160" height="160" rx="24" fill="#1e3a8a"/>
  <path d="M62 112 Q110 48 158 112 Q110 174 62 112Z" stroke="#bfdbfe" stroke-width="9" fill="none"/>
  <circle cx="110" cy="112" r="17" fill="#facc15"/>
