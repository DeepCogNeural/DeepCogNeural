  <text x="230" y="62" fill="#0f172a" font-size="34" font-weight="750" font-family="Inter, ui-sans-serif, system-ui">Bayesian Perception-Action Modeling</text>
  <text x="230" y="98" fill="#334155" font-size="19" font-family="Inter, ui-sans-serif, system-ui">Published models for how uncertain optic-flow inputs become perceptual reports and actions.</text>
  <text x="230" y="137" fill="#475569" font-size="17" font-family="Inter, ui-sans-serif, system-ui">Efficient-coding priors, posterior estimates, response mappings, and serial-dependence analysis.</text>
