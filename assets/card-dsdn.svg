<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Stochastic Divisive Normalization card</title>
  <desc id="desc">Analytical neural variability model where random noisy input, the numerator Nt, is divided by noisy normalization, the denominator Dt.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6B5D4D" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="250" rx="24" fill="#FBF7EF"/>
  <path d="M0 62H1200M0 125H1200M0 188H1200" stroke="#E7DDCE" stroke-opacity="0.5"/>
  <path d="M200 0V250M400 0V250M600 0V250M800 0V250M1000 0V250" stroke="#E7DDCE" stroke-opacity="0.34"/>
  <rect x="22" y="22" width="1156" height="206" rx="22" fill="#FFFDF8" stroke="#D8D0C1" stroke-width="1.5" filter="url(#shadow)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">

    <g transform="translate(52 44)">
      <circle cx="80" cy="80" r="72" fill="#F7EFE2" stroke="#D8D0C1" stroke-width="1.4"/>
      <text x="42" y="64" fill="#0B2447" font-size="34" font-weight="800">N<tspan baseline-shift="sub" font-size="18">t</tspan></text>
      <path d="M38 82 H124" stroke="#9CA3AF" stroke-width="7" stroke-linecap="round"/>
      <text x="42" y="125" fill="#D97757" font-size="34" font-weight="800">D<tspan baseline-shift="sub" font-size="18">t</tspan></text>
      <path d="M24 144 C48 112 70 158 96 126 C122 96 138 136 154 110" stroke="#38BDF8" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <text x="240" y="68" fill="#171717" font-size="31" font-weight="780">Stochastic Normalization Dynamics</text>
    <text x="240" y="106" fill="#5E574E" font-size="18">Random noisy input (numerator N<tspan baseline-shift="sub" font-size="12">t</tspan>) divided by noisy normalization (denominator D<tspan baseline-shift="sub" font-size="12">t</tspan>).</text>
    <text x="240" y="142" fill="#4A423A" font-size="17">Closed-form mean, variance, Fano factor, and peak timing for neural response dynamics.</text>
    <text x="240" y="184" fill="#6F7F4D" font-size="16" font-weight="720">stochastic processes | ratio models | latent-state estimation | MLE | neural time series</text>
</g>
</svg>
