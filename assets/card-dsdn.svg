  <rect x="1" y="1" width="1198" height="228" rx="17" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="30" y="35" width="160" height="160" rx="24" fill="#0f172a"/>
  <text x="72" y="86" fill="#e0f2fe" font-size="26" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">X<tspan baseline-shift="sub" font-size="15">t</tspan></text>
  <path d="M64 105 H156" stroke="#94a3b8" stroke-width="7" stroke-linecap="round"/>
  <text x="72" y="152" fill="#fef3c7" font-size="26" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">Z<tspan baseline-shift="sub" font-size="15">t</tspan></text>
